<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Nova chat poruka</title>
</head>
<body style="font-family: Inter, Arial, sans-serif; color: #111; line-height: 1.5;">
    <h2 style="margin: 0 0 16px;">Nova poruka u chatu</h2>
    <p style="margin: 0 0 8px;"><strong>Ime:</strong> {{ name }}</p>
    <p style="margin: 0 0 8px;"><strong>Email:</strong> {{ email }}</p>
    <p style="margin: 0 0 16px;"><strong>Registrovan:</strong> {{ registered }}</p>
    <p style="margin: 0 0 8px;"><strong>Vrijeme:</strong> {{ created|date:"d.m.Y." }} {{ created|time:"H:i" }}</p>
    <div style="margin: 16px 0; padding: 16px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap;">{{ message.body }}</div>
    <p style="margin: 16px 0 0;">
        <a href="{{ site_url }}/" style="color: #1a6b4a;">Prijavite se na sajt</a> da odgovorite kupcu.
    </p>
</body>
</html>
