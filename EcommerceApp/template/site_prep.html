{% load static %}
<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sajt u pripremi — opremazaribolov.ba</title>
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}?v=20260703s">

    {% if meta_pixel_id %}
    <!-- Meta Pixel Code -->
    <script data-cfasync="false">
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '{{ meta_pixel_id }}');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id={{ meta_pixel_id }}&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    {% endif %}
</head>
<body>
    <section class="auth-page site-prep-page">
        <div class="auth-card site-prep-card">
            <h1>Sajt u pripremi</h1>
            <p class="auth-lead">Unesite lozinku za pristup dok radimo na novoj verziji trgovine.</p>

            <form method="post" class="auth-form">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next_url }}">

                {% if error %}
                <div class="form-errors">
                    <p class="form-error">{{ error }}</p>
                </div>
                {% endif %}

                <div class="form-group">
                    <label for="sitePrepPassword">Lozinka</label>
                    <input
                        type="password"
                        id="sitePrepPassword"
                        name="lozinka"
                        class="form-input"
                        autocomplete="current-password"
                        required
                        autofocus
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">Ulaz</button>
            </form>
        </div>
    </section>
</body>
</html>
