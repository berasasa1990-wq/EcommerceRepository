{% if product.garancija_oznaka %}
<span class="product-warranty-badge" aria-label="Garancija: {{ product.garancija_oznaka }}">
    <span class="product-warranty-badge-inner">
        <span class="product-warranty-badge-label">GARANTNI</span>
        {% if product.garancija_oznaka != 'GARANTNI' %}
        <span class="product-warranty-badge-value">{{ product.garancija_oznaka }}</span>
        {% endif %}
    </span>
</span>
{% endif %}
