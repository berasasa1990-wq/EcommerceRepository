{% if product.prikazna_slika %}
<img src="{{ product.prikazna_slika.url }}" alt="{{ product.naziv }}" width="400" height="400" sizes="(max-width: 768px) 50vw, 25vw" loading="{{ image_loading|default:'lazy' }}"{% if image_loading == 'eager' %} fetchpriority="high"{% endif %} decoding="async" data-main-image>
{% else %}
<div class="product-image-placeholder" data-main-image>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
    </svg>
</div>
{% endif %}
