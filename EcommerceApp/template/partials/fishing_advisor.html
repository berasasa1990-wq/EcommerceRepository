{# Virtuelni ribolovački savjetnik — veći, upečatljiv chat #}
<div class="fish-advisor" id="fishAdvisor"
     data-advisor-url="{% url 'fishing_advisor' %}"
     data-buy-set-url="{% url 'fishing_advisor_buy_set' %}">
    <button type="button" class="fish-advisor__launcher" id="fishAdvisorLauncher" aria-expanded="false" aria-controls="fishAdvisorPanel">
        <span class="fish-advisor__launcher-glow" aria-hidden="true"></span>
        <span class="fish-advisor__launcher-pulse" aria-hidden="true"></span>
        <span class="fish-advisor__launcher-icon" aria-hidden="true">🎣</span>
        <span class="fish-advisor__launcher-text">
            <strong>SAVJETI PRI KUPOVINI</strong>
            <small>Idealna oprema za ~1 min</small>
        </span>
        <span class="fish-advisor__launcher-badge" aria-hidden="true">Beta</span>
    </button>

    <div class="fish-advisor__panel" id="fishAdvisorPanel" hidden role="dialog" aria-label="Ribolovački savjetnik" aria-modal="false">
        <header class="fish-advisor__header">
            <div class="fish-advisor__avatar" aria-hidden="true">🎣</div>
            <div class="fish-advisor__titles">
                <strong>Savjeti pri kupovini</strong>
                <span class="fish-advisor__online"><i></i> Online · kao razgovor s ribolovcem</span>
            </div>
            <button type="button" class="fish-advisor__close" id="fishAdvisorClose" aria-label="Zatvori savjetnika">×</button>
        </header>

        <div class="fish-advisor__messages" id="fishAdvisorMessages" aria-live="polite"></div>

        <div class="fish-advisor__products" id="fishAdvisorProducts" hidden></div>

        <div class="fish-advisor__options" id="fishAdvisorOptions"></div>

        <p class="fish-advisor__hint">Kratka pitanja · preporuka za manje od minute</p>
    </div>
</div>
