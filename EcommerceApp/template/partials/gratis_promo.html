{% if gratis_promo %}
<div class="gratis-promo" role="note">
    <div class="gratis-promo-media">
        {% if gratis_promo.slika_url %}
        <img src="{{ gratis_promo.slika_url }}"
             alt="{{ gratis_promo.gratis_naziv }}"
             width="52" height="52"
             loading="lazy" decoding="async">
        {% else %}
        <span class="gratis-promo-placeholder" aria-hidden="true"></span>
        {% endif %}
        <span class="gratis-promo-badge">
            {% if gratis_promo.is_full_discount %}GRATIS{% else %}-{{ gratis_promo.pct }}%{% endif %}
        </span>
    </div>
    <div class="gratis-promo-content">
        <span class="gratis-promo-tag">+ Gratis ponuda</span>
        <p class="gratis-promo-text">
            Ako dodate u korpu, dobijate <strong>{{ gratis_promo.gratis_naziv }}</strong>
        </p>
    </div>
</div>
{% endif %}
