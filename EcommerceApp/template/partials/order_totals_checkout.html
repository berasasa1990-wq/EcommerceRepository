<div class="order-totals order-totals--checkout">
    <div class="order-totals-row">
        <span>Iznos sa PDV-om</span>
        <span>{{ summary.medjuzbir }} KM</span>
    </div>
    <div class="order-totals-row">
        <span>Dostava — {{ summary.dostava_naziv }}</span>
        <span>
            {% if summary.besplatna_dostava %}
            Besplatno
            {% else %}
            {{ summary.dostava }} KM
            {% endif %}
        </span>
    </div>
    <div class="order-totals-row order-totals-row--discount">
        <span>POPUST</span>
        <span>{% if summary.popust %}-{{ summary.popust }}{% else %}0.00{% endif %} KM</span>
    </div>
    <div class="order-totals-row order-totals-row--total">
        <span>Ukupno za plaćanje</span>
        <strong>{{ summary.ukupno }} KM</strong>
    </div>
</div>
