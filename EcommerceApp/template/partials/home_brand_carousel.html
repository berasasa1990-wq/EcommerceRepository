{% if brands %}
<div class="home-product-carousel home-brand-carousel" data-visible-desktop="8" data-visible-mobile="4" data-autoplay-ms="4500">
    <button type="button" class="home-product-carousel__btn home-product-carousel__btn--prev" aria-label="Prethodni brendovi" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
    </button>
    <div class="home-product-carousel__viewport">
        <div class="home-product-carousel__track">
            {% for brand in brands %}
            <div class="home-product-carousel__slide">
                <a href="{% url 'home' %}?brend={{ brand.slug }}#product-showcase"
                   class="showcase-brand-link"
                   title="{{ brand.naziv }}">
                    <img src="{{ brand.slika.url }}" alt="{{ brand.naziv }}" class="showcase-brand-logo" width="120" height="30" loading="lazy" decoding="async">
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
    <button type="button" class="home-product-carousel__btn home-product-carousel__btn--next" aria-label="Sljedeći brendovi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
        </svg>
    </button>
</div>
{% endif %}
