<div class="site-popup-overlay gratis-offer-overlay" id="gratisOfferOverlay" hidden>
    <div class="site-popup site-popup--akcija site-popup--gratis-offer gratis-offer-popup"
         role="dialog"
         aria-modal="true"
         aria-labelledby="gratisOfferTitle">
        <button type="button" class="site-popup-close" id="gratisOfferClose" aria-label="Zatvori">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>

        <div class="site-popup-akcija gratis-offer-akcija">
            <div class="gratis-offer-product">
                <div class="gratis-offer-product-image">
                    <img id="gratisOfferImage" src="" alt="" width="200" height="200" loading="lazy" decoding="async" hidden>
                    <span class="gratis-offer-image-placeholder" id="gratisOfferPlaceholder" hidden aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </span>
                </div>
                <h3 class="gratis-offer-name" id="gratisOfferTitle"></h3>
            </div>

            <p class="gratis-offer-question" id="gratisOfferText"></p>

            <div class="gratis-offer-prices product-price" id="gratisOfferPrices">
                <span class="price-original" id="gratisOfferOriginal"></span>
                <span class="price-sale" id="gratisOfferDiscounted"></span>
            </div>

            <div class="site-popup-actions gratis-offer-actions">
                <button type="button" class="gratis-offer-btn" id="gratisOfferAccept">DA</button>
                <button type="button" class="gratis-offer-btn" id="gratisOfferDecline">NE</button>
            </div>
        </div>
    </div>
</div>
