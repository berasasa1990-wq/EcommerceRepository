{% if sections %}
{% for section in sections %}
<section class="category-page home-products home-products--brand-showcase">
    <div class="product-catalog product-catalog--compact home-product-catalog home-brand-showcase">
        <div class="catalog-layout catalog-layout--full">
            <div class="catalog-products">
                <div class="home-products-header home-products-header--brand-showcase">
                    {% if section.brand.slika %}
                    <a href="{{ section.brand_url }}" class="home-brand-showcase-logo" title="{{ section.brand.naziv }}">
                        <img src="{{ section.brand.slika.url }}" alt="{{ section.brand.naziv }}" loading="lazy" decoding="async" width="200" height="64">
                    </a>
                    {% else %}
                    <h2 class="home-brand-showcase-title-fallback">
                        <a href="{{ section.brand_url }}">{{ section.title }}</a>
                    </h2>
                    {% endif %}
                </div>
                {% include 'partials/home_product_carousel.html' with products=section.products home_section_badge='' hide_brand=True carousel_no_arrows=True %}
            </div>
        </div>
    </div>
</section>
{% endfor %}
{% endif %}
