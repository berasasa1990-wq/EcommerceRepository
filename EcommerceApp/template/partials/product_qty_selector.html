<div class="product-qty-selector">
    <button type="button" class="product-qty-btn product-qty-btn--minus" aria-label="Smanji količinu">−</button>
    <input type="number" name="quantity" value="1" min="1" max="99" class="product-qty-input" inputmode="numeric" aria-label="Količina">
    <button type="button" class="product-qty-btn product-qty-btn--plus" aria-label="Povećaj količinu">+</button>
</div>
